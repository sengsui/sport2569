<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานผลการแข่งขันกีฬาสีภายในโรงเรียน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        :root { --primary: #1565C0; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --radius: 12px; }
        .blink { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 210mm; height: 297mm; padding: 20mm; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white p-5 rounded-xl flex flex-col items-center shadow-2xl">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-3"></i>
            <p class="text-sm font-medium text-slate-600">กำลังประมวลผลข้อมูล...</p>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-trophy text-2xl text-amber-500 mr-2"></i>
                    <div>
                        <span id="nav-school" class="font-bold text-slate-900 block leading-tight text-base"></span>
                        <span id="nav-event" class="text-xs text-slate-500 block"></span>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-1" id="main-menu">
                    </div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-slate-600 p-2"><i class="fa-solid fa-bars text-xl"></i></button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 px-4 py-2 flex flex-col gap-2 shadow-inner"></div>
    </nav>

    <main id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[calc(100vh-4rem)]"></main>

    <div id="modal-container" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // CONFIGURATION SYSTEM SETUP
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbyGxicn-OxeoqmP-oXQYwEPaMKw1Gyw0iTgOFiqrx5XRI6vh1RiSfDd7Hag9RK35X_E/exec", // แทนที่ด้วย Web App URL ของคุณเอง
            SCHOOL_NAME: "โรงเรียนองค์การบริหารส่วนจังหวัดสุราษฎร์ธานี ๑ (ดอนสักผดุงวิทย์)",
            EVENT_NAME: "มหกรรมกีฬาสีสัมพันธ์ ราชพฤกษ์เกมส์ ประจำปี 2569 ",
            EVENT_DATE: "2026-11-20T08:00:00",
            MEDAL_SCORE: { gold: 3, silver: 2, bronze: 1 }
        };

        // APPLICATION CENTRAL STORE STATE
        let APP_STATE = { teams: [], sports: [], schedule: [], results: [], session: null };

        // INITIAL APPLICATION ROUTER ENGINE
        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('nav-school').innerText = CONFIG.SCHOOL_NAME;
            document.getElementById('nav-event').innerText = CONFIG.EVENT_NAME;
            
            // เรียกดึงข้อมูลพื้นฐานโครงสร้างหลักเพื่อเตรียมพร้อมแอปพลิเคชัน
            showLoader(true);
            try {
                APP_STATE.session = JSON.parse(sessionStorage.getItem('sports_admin_session'));
                await refreshBaseData();
                renderNavbar();
                window.addEventListener('hashchange', router);
                router();
            } catch(e) {
                showToast("ไม่สามารถเชื่อมต่อฐานข้อมูลได้", "error");
            } finally {
                showLoader(false);
            }
        });

        async function refreshBaseData() {
            const [tRes, sRes] = await Promise.all([
                fetch(`${CONFIG.API_URL}?action=getTeams`).then(r => r.json()),
                fetch(`${CONFIG.API_URL}?action=getSports`).then(r => r.json())
            ]);
            if (tRes.status === 'success') APP_STATE.teams = tRes.data;
            if (sRes.status === 'success') APP_STATE.sports = sRes.data;
        }

        // DYNAMIC CENTRAL NAVIGATION DISPATCHER
        function renderNavbar() {
            const menuContainer = document.getElementById('main-menu');
            const mobileContainer = document.getElementById('mobile-menu');
            
            let links = [
                { hash: '#home', label: 'หน้าหลัก', icon: 'fa-home' },
                { hash: '#schedule', label: 'ตารางแข่ง', icon: 'fa-calendar' },
                { hash: '#sports', label: 'ประเภทกีฬา', icon: 'fa-running' },
                { hash: '#scoreboard', label: 'กระดานคะแนน', icon: 'fa-chart-column' }
            ];

            if (APP_STATE.session) {
                links.push(
                    { hash: '#admin', label: 'ผู้ดูแล', icon: 'fa-user-shield' },
                    { hash: 'logout', label: 'ออกจากระบบ', icon: 'fa-sign-out-alt', isAction: true }
                );
            } else {
                links.push({ hash: '#login', label: 'เข้าสู่ระบบ', icon: 'fa-lock' });
            }

            const genHtml = (l) => l.isAction 
                ? `<button onclick="handleLogout()" class="flex items-center px-3 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg w-full md:w-auto text-left"><i class="fa-solid ${l.icon} mr-1.5"></i>${l.label}</button>`
                : `<a href="${l.hash}" class="flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-blue-600 hover:bg-slate-50 md:hover:bg-transparent rounded-lg"><i class="fa-solid ${l.icon} mr-1.5 text-slate-400"></i>${l.label}</a>`;

            menuContainer.innerHTML = links.map(genHtml).join('');
            mobileContainer.innerHTML = links.map(genHtml).join('');
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function handleLogout() {
            sessionStorage.removeItem('sports_admin_session');
            APP_STATE.session = null;
            showToast("ออกจากระบบเรียบร้อย", "success");
            renderNavbar();
            window.location.hash = '#home';
        }

        // SPA CLIENT SIDE ROUTER DISPATCHER
        async function router() {
            document.getElementById('mobile-menu').classList.add('hidden');
            const hash = window.location.hash || '#home';
            const app = document.getElementById('app');
            
            // เช็คเส้นทางความปลอดภัยส่วนของสิทธิ์การเข้าถึงหลังบ้าน
            if (hash.startsWith('#admin') && !APP_STATE.session) {
                window.location.hash = '#login';
                return;
            }

            app.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500 mb-2"></i><p class="text-slate-400 text-sm">กำลังโหลดเนื้อหาหน้าเว็บ...</p></div>`;

            switch(hash) {
                case '#home': await viewHome(app); break;
                case '#schedule': await viewSchedule(app); break;
                case '#sports': await viewSports(app); break;
                case '#scoreboard': await viewScoreboard(app); break;
                case '#login': viewLogin(app); break;
                case '#admin': await viewAdminDashboard(app); break;
                case '#admin-sports': await viewAdminSports(app); break;
                case '#admin-teams': await viewAdminTeams(app); break;
                case '#admin-results': await viewAdminResults(app); break;
                case '#admin-schedule': await viewAdminSchedule(app); break;
                case '#admin-import': viewAdminImport(app); break;
                case '#admin-download': viewAdminDownload(app); break;
                case '#admin-certificate': await viewAdminCertificate(app); break;
                default: app.innerHTML = `<div class="text-center py-20"><h1 class="text-2xl font-bold">ไม่พบหน้านี้ (404)</h1></div>`;
            }
        }

        // ----------------------------------------------------
        // SECTION 1: PUBLIC VIEW RENDERING ENGINE
        // ----------------------------------------------------

        async function viewHome(container) {
            const res = await fetch(`${CONFIG.API_URL}?action=getDashboard`).then(r => r.json());
            if(res.status !== 'success') return;
            const dash = res.data;

            container.innerHTML = `
                <div class="bg-gradient-to-r from-blue-700 to-indigo-800 rounded-3xl p-8 text-white mb-8 text-center md:text-left relative overflow-hidden shadow-lg">
                    <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div>
                            <span class="bg-white/20 text-xs px-3 py-1 rounded-full uppercase font-bold tracking-wider mb-2 inline-block">🎉 กิจกรรมภายในโรงเรียน</span>
                            <h1 class="text-3xl font-bold mb-2">${CONFIG.EVENT_NAME}</h1>
                            <p class="text-blue-100 text-sm font-light"><i class="fa-regular fa-calendar-alt mr-1.5"></i>เริ่มการเปิดสนามแข่งขันอย่างเป็นทางการในเวลาอันใกล้นี้</p>
                        </div>
                        <div id="countdown" class="flex gap-2 text-slate-900 bg-white/10 p-3 rounded-2xl backdrop-blur-md text-white"></div>
                    </div>
                </div>

                <h2 class="text-xl font-bold mb-4 text-slate-800"><i class="fa-solid fa-medal text-amber-500 mr-2"></i>อันดับเหรียญรางวัลรวมสูงสุด</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="medal-cards-grid"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-base mb-4 flex items-center justify-between">
                            <span><i class="fa-solid fa-ranking-star text-blue-600 mr-2"></i>กระดานผู้นำผลคะแนนรวม</span>
                        </h3>
                        <div class="overflow-x-auto"><table class="w-full text-left border-collapse" id="leaderboard-table"></table></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-base mb-4 text-slate-800"><i class="fa-solid fa-clock-rotate-left text-indigo-500 mr-2"></i>รายการอัปเดตผลล่าสุด</h3>
                        <div class="flow-root"><ul role="list" class="-mb-8" id="latest-results-list"></ul></div>
                    </div>
                </div>
            `;

            // ทำการติดตั้งระบบนับเวลาถอยหลัง (Countdown)
            initCountdown();

            // เรนเดอร์การ์ดคณะสีและตารางผู้นำ (Leaderboard) แบบแปรผันตามฐานข้อมูลจริง
            const cardsGrid = document.getElementById('medal-cards-grid');
            cardsGrid.innerHTML = dash.medals.map((m, idx) => `
                <div class="rounded-2xl p-5 border shadow-sm relative overflow-hidden transition-all hover:scale-[1.02]" style="background-color: ${m.color}; color: ${m.textColor}; border-color: ${m.color}33">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-lg">${m.name}</h4>
                        <span class="text-2xl font-black opacity-40">#0${idx+1}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-1 text-center bg-black/10 rounded-xl p-2.5">
                        <div><span class="block text-xs opacity-75 font-medium">🥇 ทอง</span><span class="font-bold text-base">${m.gold}</span></div>
                        <div><span class="block text-xs opacity-75 font-medium">🥈 เงิน</span><span class="font-bold text-base">${m.silver}</span></div>
                        <div><span class="block text-xs opacity-75 font-medium">🥉 ทองแดง</span><span class="font-bold text-base">${m.bronze}</span></div>
                    </div>
                    <div class="mt-3 text-right"><span class="text-xs opacity-80">คะแนนรวมสูงสุด:</span> <span class="font-bold text-lg">${m.score}</span></div>
                </div>
            `).join('');

            document.getElementById('leaderboard-table').innerHTML = `
                <thead>
                    <tr class="border-b border-slate-100 text-slate-400 text-xs uppercase font-medium">
                        <th class="py-3 px-4">คณะสี</th><th class="py-3 px-4 text-center">🥇 ทอง</th>
                        <th class="py-3 px-4 text-center">🥈 เงิน</th><th class="py-3 px-4 text-center">🥉 ทองแดง</th>
                        <th class="py-3 px-4 text-right">รวมคะแนน</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50 text-sm">
                    ${dash.medals.map(m => `
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="py-3.5 px-4 font-bold flex items-center"><span class="w-3 h-3 rounded-full mr-2.5 inline-block" style="background-color:${m.color}"></span>${m.name}</td>
                            <td class="py-3.5 px-4 text-center font-semibold">${m.gold}</td>
                            <td class="py-3.5 px-4 text-center font-semibold">${m.silver}</td>
                            <td class="py-3.5 px-4 text-center font-semibold">${m.bronze}</td>
                            <td class="py-3.5 px-4 text-right font-black text-blue-600">${m.score} แต้ม</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            
            document.getElementById('latest-results-list').innerHTML = dash.latestResults.length === 0 
                ? `<p class="text-sm text-slate-400 py-4 text-center">ยังไม่มีข้อมูลการบันทึกผลคะแนน</p>`
                : dash.latestResults.map((r, rIdx) => {
                    const t = APP_STATE.teams.find(team => team.id == r["id_คณะสี"]);
                    return `
                    <li>
                        <div class="relative pb-8">
                            ${rIdx !== dash.latestResults.length - 1 ? '<span class="absolute top-4 left-4 -ml-px h-full w-0.5 bg-slate-200" aria-hidden="true"></span>' : ''}
                            <div class="relative flex space-x-3">
                                <div><span class="h-8 w-8 rounded-full flex items-center justify-center ring-8 ring-white" style="background-color: ${t?.["สีหลัก(hex)"] || '#eee'}; color: ${t?.["สีข้อความ(hex)"] || '#333'}"><i class="fa-solid fa-award text-xs"></i></span></div>
                                <div class="flex-1 min-w-0 pt-1.5 flex justify-between space-x-4">
                                    <div><p class="text-sm font-medium text-slate-800">อันดับที่ ${r["อันดับ"]} (${r["ประเภทเหรียญ(ทอง/เงิน/ทองแดง/-)"]}) <span class="font-bold" style="color:${t?.["สีหลัก(hex)"]}">${t?.["ชื่อคณะ"] || ''}</span></p></div>
                                    <div class="text-right text-xs whitespace-nowrap text-slate-400"><span>สถิติ: ${r["ค่า(เวลา/คะแนน/ระยะทาง)"]}</span></div>
                                </div>
                            </div>
                        </div>
                    </li>`;
                }).join('');
        }

        function initCountdown() {
            const countTarget = new Date(CONFIG.EVENT_DATE).getTime();
            const timerFunc = () => {
                const now = new Date().getTime();
                const distance = countTarget - now;
                const el = document.getElementById('countdown');
                if(!el) return;
                if (distance < 0) { el.innerHTML = "🏁 เริ่มทำการแข่งขันอย่างเป็นทางการ!"; return; }
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                el.innerHTML = `<span class="font-bold text-base bg-white/20 px-2 py-0.5 rounded">${days}วัน</span> : <span class="font-bold text-base bg-white/20 px-2 py-0.5 rounded">${hours}ชม</span> : <span class="font-bold text-base bg-white/20 px-2 py-0.5 rounded">${minutes}น</span>`;
            };
            timerFunc();
            setInterval(timerFunc, 60000);
        }

        async function viewSchedule(container) {
            showLoader(true);
            const res = await fetch(`${CONFIG.API_URL}?action=getSchedule`).then(r => r.json());
            showLoader(false);
            if(res.status !== 'success') return;
            APP_STATE.schedule = res.data;

            container.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <h2 class="text-xl font-bold text-slate-900"><i class="fa-solid fa-calendar-days text-blue-600 mr-2"></i>ตารางกำหนดการแข่งขันทั้งหมด</h2>
                    <div class="flex flex-wrap gap-2">
                        <select id="filter-sport" onchange="applyScheduleFilters()" class="bg-white border border-slate-200 text-sm px-3 py-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">กรองตามชนิดกีฬา (ทั้งหมด)</option>
                            ${APP_STATE.sports.map(s => `<option value="${s.id}">${s["ชื่อกีฬา"]} (${s["ช่วงชั้น"]})</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto"><table class="w-full text-left border-collapse" id="schedule-table"></table></div>
                </div>
            `;
            applyScheduleFilters();
        }

        function applyScheduleFilters() {
            const sportId = document.getElementById('filter-sport').value;
            let filtered = APP_STATE.schedule;
            if(sportId) filtered = filtered.filter(s => s["id_กีฬา"] == sportId);

            const table = document.getElementById('schedule-table');
            table.innerHTML = `
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase">
                        <th class="py-3 px-4">วัน-เวลา</th><th class="py-3 px-4">ประเภทกีฬา / รายการ</th>
                        <th class="py-3 px-4">สถานที่</th><th class="py-3 px-4 text-center">สถานะ</th>
                        <th class="py-3 px-4 text-center no-print">จัดการ</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm">
                    ${filtered.length === 0 ? `<tr><td colspan="5" class="text-center py-8 text-slate-400">ไม่พบตารางการแข่งขันที่ตรงตามเงื่อนไข</td></tr>` : filtered.map(s => {
                        const sport = APP_STATE.sports.find(sp => sp.id == s["id_กีฬา"]);
                        let statusBadge = '';
                        if(s["สถานะ(รอ/กำลังแข่ง/จบ/เลื่อน/ยกเลิก)"] === 'กำลังแข่ง') statusBadge = `<span class="bg-emerald-500 text-white font-medium text-xs px-2.5 py-1 rounded-full blink"><i class="fa-solid fa-play mr-1"></i>กำลังแข่ง</span>`;
                        else if(s["สถานะ(รอ/กำลังแข่ง/จบ/เลื่อน/ยกเลิก)"] === 'จบ') statusBadge = `<span class="bg-slate-100 text-slate-500 font-medium text-xs px-2.5 py-1 rounded-full">แข่งขันจบแล้ว</span>`;
                        else statusBadge = `<span class="bg-amber-50 text-amber-600 border border-amber-200 font-medium text-xs px-2.5 py-1 rounded-full">${s["สถานะ(รอ/กำลังแข่ง/จบ/เลื่อน/ยกเลิก)"] || 'รอการแข่ง'}</span>`;

                        return `
                        <tr class="hover:bg-slate-50/50 transition-colors cursor-pointer" onclick="viewScheduleDetails(${s.id})">
                            <td class="py-4 px-4 font-medium">${s["วันที่"]}<br><span class="text-xs text-slate-400">${s["เวลาเริ่ม"]} - ${s["เวลาสิ้นสุด"]} น.</span></td>
                            <td class="py-4 px-4"><span class="font-bold text-slate-900">${sport ? sport["ชื่อกีฬา"] : 'ไม่ระบุ'}</span><br><span class="text-xs text-slate-500">${sport ? `${sport["ประเภท(เดี่ยว/ทีม)"]} | ${sport["เพศ(ชาย/หญิง/รวม)"]} | ${sport["ช่วงชั้น"]}` : ''}</span></td>
                            <td class="py-4 px-4 text-slate-600"><i class="fa-solid fa-location-dot text-slate-400 mr-1"></i>${s["สถานที่"]}</td>
                            <td class="py-4 px-4 text-center">${statusBadge}</td>
                            <td class="py-4 px-4 text-center no-print" onclick="event.stopPropagation()"><button onclick="viewScheduleDetails(${s.id})" class="text-blue-600 hover:text-blue-800 font-medium text-xs">ดูข้อมูล</button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            `;
        }

        async function viewScheduleDetails(id) {
            const sched = APP_STATE.schedule.find(s => s.id == id);
            const sport = APP_STATE.sports.find(sp => sp.id == sched["id_กีฬา"]);
            
            showLoader(true);

        async function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            showLoader(true);
            // สร้าง SHA-256 ผ่านระบบโครงสร้างดั้งเดิมด้วย Web Crypto API ฝั่งผู้ใช้
            const msgBuffer = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            try {
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username: user, passwordHash: hashHex })
                }).then(r => r.json());

                if (res.status === 'success') {
                    APP_STATE.session = { token: res.token, name: res.user.name, role: res.user.role };
                    sessionStorage.setItem('sports_admin_session', JSON.stringify(APP_STATE.session));
                    showToast("ยินดีต้อนรับเข้าสู่ระบบจัดการส่วนหลังบ้าน", "success");
                    renderNavbar();
                    window.location.hash = '#admin';
                } else {
                    showToast(res.message, "error");
                }
            } catch(err) {
                showToast("เครือข่ายเชื่อมต่อขัดข้อง", "error");
            } finally {
                showLoader(false);
            }
        }

        let TEMP_IMPORTED_DATA = [];
        
        function downloadAthleteTemplate() {
            const wsData = [["เลขประจำตัว", "ชื่อ", "นามสกุล", "ชั้น/ห้อง", "id_คณะสี", "id_กีฬา", "หมายเหตุ"], ["10001", "สมชาย", "ใจดี", "ม.4/1", "1", "1", "นัดหมายทดสอบก่อนแข่ง"]];
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "รายชื่อรอนำเข้า");
            XLSX.writeFile(wb, "Template_Athlete_Import.xlsx");
        }

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // แปลงไฟล์รับค่าออกมาในรูปแบบอาเรย์เชิงโครงสร้าง JSON
                const json = XLSX.utils.sheet_to_json(worksheet);
                
                if(json.length === 0) { showToast("ไฟล์ว่างเปล่า ไม่มีข้อมูลระบุ", "error"); return; }
                TEMP_IMPORTED_DATA = json;
                
                document.getElementById('import-preview-zone').classList.remove('hidden');
                const pTable = document.getElementById('preview-table');
                pTable.innerHTML = `
                    <tr class="bg-slate-50 font-bold text-slate-500 border-b"><th class="p-2">เลขประจำตัว</th><th class="p-2">ชื่อ-นามสกุล</th><th class="p-2">ชั้น/ห้อง</th><th class="p-2">ID คณะสี</th><th class="p-2">ID กีฬา</th></tr>
                    ${json.slice(0, 10).map(r => `<tr class="border-b text-slate-600">
                        <td class="p-2">${r["เลขประจำตัว"]||'-'}</td><td class="p-2">${r["ชื่อ"]||''} ${r["นามสกุล"]||''}</td>
                        <td class="p-2">${r["ชั้น/ห้อง"]||'-'}</td><td class="p-2">${r["id_คณะสี"]||'-'}</td><td class="p-2">${r["id_กีฬา"]||'-'}</td>
                    </tr>`).join('')}
                `;
            };
            reader.readAsArrayBuffer(file);
        }

        async function exportTableToExcel(sheetName) {
            showLoader(true);
            try {
                const response = await fetch(`${CONFIG.API_URL}?action=get${sheetName === 'คณะสี' ? 'Teams' : sheetName === 'ประเภทกีฬา' ? 'Sports' : sheetName === 'ตารางการแข่งขัน' ? 'Schedule' : 'Athletes'}`).then(r => r.json());
                showLoader(false);
                if (response.status !== 'success') { showToast("ดึงชุดข้อมูลล้มเหลว", "error"); return; }
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(response.data);
                XLSX.utils.book_append_sheet(wb, ws, sheetName);
                XLSX.writeFile(wb, `รายงานผลข้อมูล_${sheetName}.xlsx`);
                showToast("ส่งออกสร้างไฟล์สเปรดชีตเสร็จสิ้น", "success");
            } catch { showLoader(false); showToast("ไม่สามารถประมวลผลดึงไฟล์ได้สำเร็จ", "error"); }
        }

        async function viewAdminCertificate(container) {
            showLoader(true);
            const res = await fetch(`${CONFIG.API_URL}?action=getSchedule`).then(r => r.json());
            showLoader(false);
            if(res.status !== 'success') return;
            // คัดกรองและดึงเลือกเฉพาะรายการสเตตัสแมตช์ที่เสร็จสิ้นปิดฉากการแข่งแล้ว
            const finishedMatches = res.data.filter(s => s["สถานะ(รอ/กำลังแข่ง/จบ/เลื่อน/ยกเลิก)"] === 'จบ');

            container.innerHTML = `
                <div class="mb-6 no-print flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                    <div>
                        <h2 class="text-lg font-bold text-slate-900"><i class="fa-solid fa-certificate text-purple-600 mr-2"></i>ระบบจัดทำและสั่งพิมพ์เกียรติบัตรนักกีฬาผู้ชนะ</h2>
                        <p class="text-xs text-slate-400">เลือกแมตช์กีฬาด้านล่างเพื่อประมวลผลจัดเตรียมพรีวิวรูปเล่มบนหน้ากระดาษ A4</p>
                    </div>
                    <select id="cert-sched-selector" onchange="loadCertificatePreview(this.value)" class="bg-white border text-xs px-3 py-2 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <option value="">-- กรุณาเลือกรายการการแข่งที่จบลง --</option>
                        ${finishedMatches.map(s => {
                            const sport = APP_STATE.sports.find(sp => sp.id == s["id_กีฬา"]);
                            return `<option value="${s.id}">${s["วันที่"]} - ${sport?.[ "ชื่อกีฬา" ] || 'ไม่ระบุ'}</option>`;
                        }).join('')}
                    </select>
                </div>
                <div id="cert-printable-zone" class="hidden">
                    <div class="mb-4 text-right no-print"><button onclick="window.print()" class="bg-purple-600 text-white font-bold text-xs px-4 py-2 rounded-xl shadow-md hover:bg-purple-700"><i class="fa-solid fa-print mr-1.5"></i>สั่งพิมพ์ชุดเกียรติบัตรออกเครื่องพิมพ์ (A4)</button></div>
                    <div id="cert-wrapper" class="space-y-8 flex flex-col items-center"></div>
                </div>
            `;
        }

        async function loadCertificatePreview(schedId) {
            if(!schedId) { document.getElementById('cert-printable-zone').classList.add('hidden'); return; }
            showLoader(true);
            const sched = APP_STATE.schedule.find(s => s.id == schedId);
            const sport = APP_STATE.sports.find(sp => sp.id == sched["id_กีฬา"]);
            const res = await fetch(`${CONFIG.API_URL}?action=getResults&schedule_id=${schedId}`).then(r => r.json());
            showLoader(false);

            if (res.status !== 'success' || res.data.length === 0) { showToast("ไม่พบผู้มีรายชื่อบันทึกรับรางวัลในรายการนี้", "error"); return; }
            
            document.getElementById('cert-printable-zone').classList.remove('hidden');
            const wrapper = document.getElementById('cert-wrapper');
            
            wrapper.innerHTML = res.data.map(r => {
                const team = APP_STATE.teams.find(t => t.id == r["id_คณะสี"]);
                return `
                    <div class="print-area w-[297mm] h-[210mm] bg-white border-[16px] border-amber-500/20 rounded-xl p-16 flex flex-col justify-between text-center relative shadow-xl overflow-hidden" style="page-break-after: always; box-sizing: border-box;">
                        <div class="absolute inset-4 border-2 border-amber-500/30 rounded-lg pointer-events-none"></div>
                        <div class="mt-4">
                            <i class="fa-solid fa-ribbon text-5xl text-amber-500 mb-2 block"></i>
                            <h2 class="text-3xl font-black text-slate-900 tracking-wide">${CONFIG.SCHOOL_NAME}</h2>
                            <p class="text-xs text-slate-400 mt-0.5 tracking-widest uppercase">ใบประกาศเกียรติบัตรเชิดชูเกียรติประวัติกรรม</p>
                        </div>
                        <div class="my-6">
                            <p class="text-sm text-slate-500 font-light">ขอคัดแจ้งรับรองว่า คณะนักกีฬาตัวแทนของ</p>
                            <h3 class="text-4xl font-extrabold text-blue-800 my-3" style="color: ${team?.["สีหลัก(hex)"] || '#1e3a8a'}">${team ? team["ชื่อคณะ"] : 'ไม่ระบุสังกัดสี'}</h3>
                            <p class="text-base font-medium text-slate-700 max-w-xl mx-auto leading-relaxed">ได้สร้างเกียรติยศสูงสุดและประสบความสำเร็จคว้าตำแหน่ง <span class="font-bold text-amber-600">"อันดับที่ ${r["อันดับ"]} (${r["ประเภทเหรียญ(ทอง/เงิน/ทองแดง/-)"]})"</span> ในการจัดแข่งขันชนิดกีฬา <span class="font-bold text-slate-900">${sport ? sport["ชื่อกีฬา"] : 'ไม่ระบุ'}</span></p>
                            <p class="text-xs text-slate-400 font-mono mt-1">บันทึกสถิติทางการลงทะเบียนระบบ: ${r["ค่า(เวลา/คะแนน/ระยะทาง)"] || '-'}</p>
                        </div>
                        <div class="mb-4 flex justify-around items-end pt-6 border-t border-slate-100 max-w-2xl mx-auto w-full text-xs">
                            <div class="w-48"><div class="border-b border-slate-400 h-8"></div><p class="text-slate-500 mt-1.5 font-medium">อาจารย์ผู้ควบคุมการตัดสิน</p></div>
                            <div><p class="text-slate-400 font-serif">ให้ไว้ ณ วันที่ ${sched["วันที่"]}</p></div>
                            <div class="w-48"><div class="border-b border-slate-400 h-8"></div><p class="text-slate-500 mt-1.5 font-medium">ผู้อำนวยการสถานศึกษา</p></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ----------------------------------------------------
        // SECTION 3: UTILITY FRAMEWORK CONTROLLERS
        // ----------------------------------------------------

        function showLoader(toggle) { document.getElementById('loader').classList[toggle ? 'remove' : 'add']('hidden'); }
        function openModal(htmlContent) { document.getElementById('modal-content').innerHTML = htmlContent; document.getElementById('modal-container').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center p-3 text-xs font-bold rounded-xl shadow-xl transition-all duration-300 transform translate-y-2 border ${type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-rose-50 text-rose-800 border-rose-200'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check text-emerald-500' : 'fa-circle-exclamation text-rose-500'} mr-2 text-base"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-2'); toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }
    </script>
</body>
</html>
